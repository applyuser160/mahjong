name: Benchmark Comparison

on:
  pull_request:
    branches:
      - main
      - feature/*

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # リポジトリ既存のCargoキャッシュアクションを活用
      - name: Cache Cargo
        uses: ./.github/actions/cache_cargo

      - name: Install critcmp
        run: |
          wget https://github.com/cargo-bins/cargo-binstall/releases/latest/download/cargo-binstall-x86_64-unknown-linux-musl.tgz
          tar -xzvf cargo-binstall-x86_64-unknown-linux-musl.tgz
          ./cargo-binstall -y critcmp

      # 1. マージ先（main）のベンチマークを実行し、「main」という名前で結果を保存
      - name: Run benchmark on target branch
        run: |
          git checkout ${{ github.base_ref }}
          cargo bench --bench mahjong_benchmark -- --save-baseline main

      # 2. 現在のPRのベンチマークを実行し、「pr」という名前で結果を保存
      - name: Run benchmark on PR branch
        run: |
          git checkout ${{ github.sha }}
          cargo bench --bench mahjong_benchmark -- --save-baseline pr

      # 3. 保存した2つのベースライン（main と pr）を比較してMarkdownに出力
      - name: Compare benchmarks
        run: |
          echo "### 📊 パフォーマンスベンチマーク結果" > comment.md
          echo "PRコードの変更による、ベースライン（\`${{ github.base_ref }}\`）との実行速度比較です。" >> comment.md
          echo "" >> comment.md
          echo "\`\`\`text" >> comment.md
          # テキストファイルではなく、保存した名前を渡す
          critcmp main pr >> comment.md
          echo "\`\`\`" >> comment.md

      # 4. PRにコメント
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentBody = fs.readFileSync('comment.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => comment.body.includes('### 📊 パフォーマンスベンチマーク結果'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }
